services:
  backend:
    image: registry.recklessabandon.dev/murderboard-backend:latest
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    image: registry.recklessabandon.dev/murderboard-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
